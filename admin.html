<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eng Hassan Dashboard | Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card: #1e293b; --main: #6366f1; --danger: #f43f5e; --online: #10b981; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; height: 100dvh; display: flex; overflow: hidden; }
        
        .sidebar { width: 280px; background: var(--card); transition: 0.3s; position: absolute; right: -280px; height: 100%; z-index: 100; border-left: 1px solid #334155; }
        .sidebar.open { right: 0; }
        
        .main { flex-grow: 1; display: flex; flex-direction: column; width: 100%; }
        .header { padding: 12px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; }
        
        .warn-bar { padding: 10px; background: #0f172a; border-bottom: 1px solid #334155; display: flex; gap: 5px; }
        .warn-bar input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; }
        .warn-bar button { background: var(--danger); border: none; color: white; padding: 10px; border-radius: 8px; font-weight: bold; }

        .room-item { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .room-item.active { border-color: var(--main); }
        .dot { width: 12px; height: 12px; background: #475569; border-radius: 50%; margin-left: 8px; }
        .dot.online { background: var(--online); box-shadow: 0 0 10px var(--online); }

        .message-feed { flex-grow: 1; overflow-y: auto; padding: 15px; background: #020617; display: flex; flex-direction: column; gap: 8px; }
        .msg-card { background: var(--card); padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        
        #lock { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        @media (min-width: 768px) { .sidebar { position: relative; right: 0; } .menu-btn { display: none; } }
    </style>
</head>
<body>

    <div id="lock">
        <div style="background:var(--card); padding:30px; border-radius:25px; text-align:center;">
            <h3 style="color:var(--main)">Eng/Hassan</h3>
            <input type="password" id="pass" placeholder="رمز الدخول" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:none; text-align:center;">
            <button onclick="unlock()" style="width:100%; padding:12px; background:var(--main); border:none; color:white; border-radius:10px; font-weight:bold;">دخول</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding:20px; text-align:center; border-bottom:1px solid #334155;">قائمة الغرف</div>
        <div id="rList" style="padding:15px; overflow-y:auto; height: 80%;"></div>
    </div>

    <div class="main">
        <div class="header">
            <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:var(--main); border:none; color:white; padding:8px 15px; border-radius:8px;">☰</button>
            <div id="curR" style="font-weight:bold; color:var(--main);">اختر غرفة</div>
            <div style="font-size:10px;">Hassan Dashboard</div>
        </div>
        
        <div class="warn-bar" id="warnBar" style="display:none">
            <input type="text" id="warnMsg" placeholder="اكتب تحذير للمستخدمين...">
            <button onclick="sendWarn()">إرسال تحذير ⚠️</button>
        </div>

        <div class="message-feed" id="mFeed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqaoLsPBAY9XJ5_z9x8rGFLK3EdCfE2LQ",
            authDomain: "tawasol-84fcb.firebaseapp.com",
            databaseURL: "https://tawasol-84fcb-default-rtdb.firebaseio.com",
            projectId: "tawasol-84fcb",
            storageBucket: "tawasol-84fcb.appspot.com",
            messagingSenderId: "170212696274",
            appId: "1:170212696274:web:c582dabcfead1c58a24d0b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selectedR = "";

        window.unlock = () => {
            if(document.getElementById('pass').value === "Hassan2026") {
                document.getElementById('lock').style.display = 'none';
                loadRooms();
            } else alert("خطأ!");
        };

        function loadRooms() {
            onValue(ref(db, 'config'), snap => {
                const list = document.getElementById('rList');
                list.innerHTML = "";
                snap.forEach(room => {
                    const name = room.key;
                    const div = document.createElement('div');
                    div.className = `room-item ${selectedR === name ? 'active' : ''}`;
                    div.innerHTML = `<div><span class="dot" id="dot-${name}"></span>${name}</div> <span onclick="delR('${name}')">🗑️</span>`;
                    div.onclick = (e) => { if(e.target.tagName !== 'SPAN') select(name); };
                    list.appendChild(div);
                    monitor(name);
                });
            });
        }

        function monitor(name) {
            onValue(ref(db, `online/${name}`), snap => {
                const dot = document.getElementById(`dot-${name}`);
                if(dot) snap.exists() ? dot.classList.add('online') : dot.classList.remove('online');
            });
        }

        function select(name) {
            selectedR = name;
            document.getElementById('curR').textContent = name;
            document.getElementById('warnBar').style.display = 'flex';
            onValue(ref(db, `msgs/${name}`), snap => {
                const feed = document.getElementById('mFeed');
                feed.innerHTML = "";
                snap.forEach(mSnap => {
                    const m = mSnap.val();
                    const card = document.createElement('div');
                    card.className = "msg-card";
                    card.innerHTML = `<div><small style="color:var(--main)">${m.user}</small><br>${m.text}</div><button onclick="delM('${name}','${mSnap.key}')" style="background:var(--danger); border:none; color:white; padding:5px; border-radius:5px;">حذف</button>`;
                    feed.prepend(card);
                });
            });
        }

        window.sendWarn = () => {
            const msg = document.getElementById('warnMsg');
            if(!selectedR || !msg.value.trim()) return;
            push(ref(db, `msgs/${selectedR}`), { user: "ADMIN", text: msg.value, type: "warning" });
            msg.value = "";
            alert("تم إرسال التحذير!");
        };

        window.delM = (r, id) => remove(ref(db, `msgs/${r}/${id}`));
        window.delR = (r) => { if(confirm("حذف الغرفة؟")) { remove(ref(db, `msgs/${r}`)); remove(ref(db, `config/${r}`)); remove(ref(db, `online/${r}`)); } };
    </script>
</body>
</html>
