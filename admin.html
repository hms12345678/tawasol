<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eng Hassan | Admin Panel v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --main: #6366f1; --danger: #ef4444; --online: #22c55e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100dvh; overflow: hidden; }

        /*Sidebar للموبايل*/
        .sidebar { 
            width: 260px; background: var(--panel); border-left: 1px solid #334155; 
            display: flex; flex-direction: column; transition: 0.3s; 
            position: absolute; right: -260px; height: 100%; z-index: 100;
        }
        .sidebar.open { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .sidebar-header { padding: 20px; background: #111827; text-align: center; border-bottom: 1px solid #334155; }

        .main { flex-grow: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        .header { padding: 10px 15px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); }
        
        .menu-btn { background: var(--main); border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .room-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .room-item { 
            background: #0f172a; padding: 12px; border-radius: 10px; margin-bottom: 10px; 
            display: flex; align-items: center; justify-content: space-between; border: 1px solid transparent;
        }
        .room-item.active { border-color: var(--main); background: rgba(99, 102, 241, 0.1); }
        
        /* النقطة الخضراء */
        .dot { width: 12px; height: 12px; background: #475569; border-radius: 50%; margin-left: 8px; flex-shrink: 0; }
        .dot.online { 
            background: var(--online); 
            box-shadow: 0 0 10px var(--online); 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* منطقة التحذير */
        .warn-area { padding: 10px; background: #0f172a; display: flex; gap: 5px; border-bottom: 1px solid #334155; }
        .warn-area input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; font-size: 14px; outline: none; }
        .warn-area button { background: var(--danger); border: none; color: white; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .feed { flex-grow: 1; overflow-y: auto; padding: 15px; background: #020617; display: flex; flex-direction: column; gap: 8px; }
        .msg-card { background: var(--panel); padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; font-size: 14px; }
        
        .del-btn { background: var(--danger); border: none; color: white; padding: 5px 8px; border-radius: 5px; font-size: 11px; }

        #lock { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        /* للشاشات الكبيرة */
        @media (min-width: 768px) {
            .sidebar { position: relative; right: 0; }
            .menu-btn { display: none; }
        }
    </style>
</head>
<body>

    <div id="lock">
        <div style="background:var(--panel); padding:30px; border-radius:20px; text-align:center; width:100%; max-width:320px;">
            <h3 style="color:var(--main); margin:0;">Eng/Hassan</h3>
            <input type="password" id="p" placeholder="كلمة السر" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:none; text-align:center; font-size:18px;">
            <button onclick="unlock()" style="width:100%; padding:12px; background:var(--main); border:none; color:white; border-radius:10px; font-weight:bold;">دخول</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h4 style="margin:0;">الغرف (<span id="rCount">0</span>)</h4>
            <button onclick="toggleMenu()" style="margin-top:10px; background:none; border:1px solid #444; color:white; font-size:11px; padding:3px 10px; border-radius:5px;">إغلاق القائمة</button>
        </div>
        <div class="room-list" id="rList"></div>
    </div>

    <div class="main">
        <div class="header">
            <button class="menu-btn" onclick="toggleMenu()">☰ الغرف</button>
            <div id="curR" style="font-weight:bold; color:var(--main); font-size:15px;">اختر غرفة</div>
            <div style="font-size:10px; opacity:0.5;">Eng/Hassan</div>
        </div>

        <div class="warn-area" id="warnBox" style="display:none">
            <input type="text" id="warnMsg" placeholder="اكتب تحذير للغرفة...">
            <button onclick="sendWarn()">تحذير ⚠️</button>
        </div>

        <div class="feed" id="mFeed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqaoLsPBAY9XJ5_z9x8rGFLK3EdCfE2LQ",
            authDomain: "tawasol-84fcb.firebaseapp.com",
            databaseURL: "https://tawasol-84fcb-default-rtdb.firebaseio.com",
            projectId: "tawasol-84fcb",
            storageBucket: "tawasol-84fcb.appspot.com",
            messagingSenderId: "170212696274",
            appId: "1:170212696274:web:c582dabcfead1c58a24d0b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selected = "";

        window.unlock = () => {
            if(document.getElementById('p').value === "Hassan2026") {
                document.getElementById('lock').style.display = 'none';
                loadRooms();
            } else alert("خطأ يا بشمهندس!");
        };

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('open');

        function loadRooms() {
            onValue(ref(db, 'config'), snap => {
                const list = document.getElementById('rList');
                list.innerHTML = "";
                let count = 0;
                snap.forEach(room => {
                    count++;
                    const name = room.key;
                    const div = document.createElement('div');
                    div.className = `room-item ${selected === name ? 'active' : ''}`;
                    div.innerHTML = `
                        <div style="display:flex; align-items:center">
                            <span class="dot" id="dot-${name}"></span>
                            <b>${name}</b>
                        </div>
                        <span onclick="delRoom('${name}')" style="color:var(--danger); font-size:18px;">🗑️</span>
                    `;
                    div.onclick = (e) => { if(e.target.tagName !== 'SPAN') { selectRoom(name); toggleMenu(); } };
                    list.appendChild(div);
                    monitorOnline(name);
                });
                document.getElementById('rCount').textContent = count;
            });
        }

        function monitorOnline(name) {
            onValue(ref(db, `online/${name}`), snap => {
                const dot = document.getElementById(`dot-${name}`);
                if(dot) snap.exists() ? dot.classList.add('online') : dot.classList.remove('online');
            });
        }

        function selectRoom(name) {
            selected = name;
            document.getElementById('curR').textContent = name;
            document.getElementById('warnBox').style.display = 'flex';
            onValue(ref(db, `msgs/${name}`), snap => {
                const feed = document.getElementById('mFeed');
                feed.innerHTML = "";
                snap.forEach(mSnap => {
                    const m = mSnap.val();
                    const card = document.createElement('div');
                    card.className = "msg-card";
                    card.innerHTML = `
                        <div style="flex:1">
                            <small style="color:var(--main); display:block">${m.user}</small>
                            <span>${m.text || '[ميديا]'}</span>
                        </div>
                        <button class="del-btn" onclick="delMsg('${name}','${mSnap.key}')">حذف</button>
                    `;
                    feed.prepend(card);
                });
            });
        }

        window.sendWarn = () => {
            const msg = document.getElementById('warnMsg');
            if(!selected || !msg.value.trim()) return;
            push(ref(db, `msgs/${selected}`), { user: "الإدارة", text: msg.value, type: "warning" });
            msg.value = "";
            alert("تم إرسال التحذير!");
        };

        window.delMsg = (r, id) => remove(ref(db, `msgs/${r}/${id}`));
        window.delRoom = (r) => { if(confirm(`حذف غرفة ${r}؟`)) { remove(ref(db, `msgs/${r}`)); remove(ref(db, `config/${r}`)); remove(ref(db, `online/${r}`)); } };
    </script>
</body>
</html>
