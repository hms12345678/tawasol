<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tawasol Pro | Eng Hassan Sobeh</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* شاشة الدخول */
        .auth-card { background: var(--card); padding: 25px; border-radius: 20px; width: 92%; max-width: 380px; margin: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #0b1120; padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 10px; text-align: center; font-size: 14px; transition: 0.3s; }
        .tab.active { background: var(--main); color: white; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); }
        
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-family: 'Cairo'; font-size: 16px; outline: none; }
        input:focus { border-color: var(--main); }
        .footer-brand { text-align: center; font-size: 12px; margin-top: 20px; opacity: 0.6; color: var(--main); font-weight: bold; }

        /* شاشة الشات */
        .chat-view { display: none; flex-direction: column; height: 100%; width: 100%; }
        .chat-header { padding: 12px 18px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0b1120; }
        
        /* إشعار النظام (انضم فلان) */
        .system-msg { align-self: center; background: rgba(34, 197, 94, 0.1); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 12px; margin: 10px 0; border: 1px solid rgba(34, 197, 94, 0.2); }

        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; display: flex; align-items: flex-end; gap: 8px; }
        .msg.me { align-self: flex-start; background: var(--main); color: white; border-bottom-left-radius: 4px; }
        .msg.other { align-self: flex-end; background: #2d3748; color: white; border-bottom-right-radius: 4px; flex-direction: row-reverse; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: #4a5568; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; flex-shrink: 0; }
        
        .input-bar { padding: 10px; background: var(--card); display: flex; gap: 8px; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .icon-btn { width: 42px; height: 42px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 18px; border: none; color: white; cursor: pointer; }
        .send-btn { background: var(--main); width: 45px; height: 45px; border-radius: 50%; color: white; font-size: 18px; border: none; cursor: pointer; }
        
        #typingIndicator { font-size: 11px; color: var(--accent); padding: 5px 15px; display: none; font-weight: bold; }
        .recording { background: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="auth-card" id="authScreen">
        <h2 style="text-align: center; color: var(--main); margin: 0 0 10px 0;">Tawasol Ultra</h2>
        <div class="tabs">
            <div class="tab active" id="joinTab" onclick="switchMode('join')">انضمام</div>
            <div class="tab" id="createTab" onclick="switchMode('create')">إنشاء غرفة</div>
        </div>
        <input type="text" id="userName" placeholder="اسمك الكامل">
        <input type="text" id="roomName" placeholder="اسم الغرفة">
        <input type="password" id="roomPass" placeholder="كلمة السر">
        <button onclick="processAuth()" id="authBtn" style="width: 100%; background: var(--main); color: white; padding: 13px; border-radius: 12px; font-weight: bold; font-family: 'Cairo';">دخول المحادثة</button>
        <div class="footer-brand">تم الإنشاء بواسطة Eng/Hassan Sobeh</div>
    </div>

    <div class="chat-view" id="chatScreen">
        <div class="chat-header">
            <div>
                <div style="font-weight: bold; color: var(--main); font-size: 16px;" id="roomTitle">--</div>
                <div style="font-size: 10px; opacity: 0.5;">Eng Hassan Sobeh Edition</div>
            </div>
            <button onclick="location.reload()" style="background: transparent; color: var(--danger); font-size: 14px; font-weight: bold; border:none; cursor:pointer;">خروج</button>
        </div>
        <div id="messages"></div>
        <div id="typingIndicator"></div>
        <div class="input-bar">
            <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="uploadFile(this.files[0], 'image')">
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">🖼️</button>
            <button class="icon-btn" id="micBtn" onclick="toggleRecording()">🎤</button>
            <input type="text" id="msgInput" placeholder="رسالتك..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqaoLsPBAY9XJ5_z9x8rGFLK3EdCfE2LQ",
            authDomain: "tawasol-84fcb.firebaseapp.com",
            databaseURL: "https://tawasol-84fcb-default-rtdb.firebaseio.com",
            projectId: "tawasol-84fcb",
            storageBucket: "tawasol-84fcb.appspot.com",
            messagingSenderId: "170212696274",
            appId: "1:170212696274:web:c582dabcfead1c58a24d0b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let user, room, pass, mode = 'join', isRecording = false, mediaRecorder, audioChunks = [];

        window.switchMode = (m) => {
            mode = m;
            document.getElementById('joinTab').className = m === 'join' ? 'tab active' : 'tab';
            document.getElementById('createTab').className = m === 'create' ? 'tab active' : 'tab';
            document.getElementById('authBtn').textContent = m === 'join' ? 'دخول المحادثة' : 'إنشاء وتفعيل الغرفة';
        };

        window.processAuth = async () => {
            user = document.getElementById('userName').value.trim();
            room = document.getElementById('roomName').value.trim();
            pass = document.getElementById('roomPass').value.trim();
            if(!user || !room || !pass) return alert("يرجى ملء كافة الحقول");

            const roomRef = ref(db, 'config/' + room);
            const snap = await get(roomRef);

            if(mode === 'create') {
                if(snap.exists()) return alert("هذه الغرفة موجودة بالفعل، اختر اسماً آخر");
                await set(roomRef, { pass });
            } else {
                if(!snap.exists()) return alert("الغرفة غير موجودة");
                if(snap.val().pass !== pass) return alert("كلمة سر الغرفة خاطئة");
            }

            // إرسال إشعار انضمام
            push(ref(db, 'msgs/' + room), { type: 'system', text: `انضم ${user} إلى المحادثة` });
            
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('roomTitle').textContent = room;
            listen();
        };

        window.handleTyping = () => {
            set(ref(db, 'type/' + room + '/' + user), true);
            clearTimeout(window.tOut);
            window.tOut = setTimeout(() => set(ref(db, 'type/' + room + '/' + user), false), 2000);
        };

        function listen() {
            // الاستماع للرسائل
            onChildAdded(ref(db, 'msgs/' + room), (snap) => {
                const v = snap.val();
                const div = document.createElement('div');
                
                if(v.type === 'system') {
                    div.className = "system-msg";
                    div.textContent = v.text;
                } else {
                    div.className = v.user === user ? "msg me" : "msg other";
                    let content = v.type === 'text' ? `<span>${v.text}</span>` : 
                                  v.type === 'image' ? `<img src="${v.url}" class="chat-img" onclick="window.open('${v.url}')">` : 
                                  `<audio controls src="${v.url}"></audio>`;
                    div.innerHTML = `<div class="msg-avatar">${v.user[0]}</div><div style="display:flex;flex-direction:column"><small style="font-size:9px;opacity:0.6;margin-bottom:2px">${v.user}</small>${content}</div>`;
                }
                
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });

            // الاستماع للكتابة (إظهار اسم الشخص)
            onValue(ref(db, 'type/' + room), (snap) => {
                let typers = [];
                snap.forEach(c => { if(c.val() && c.key !== user) typers.push(c.key); });
                const indicator = document.getElementById('typingIndicator');
                if(typers.length > 0) {
                    indicator.style.display = 'block';
                    indicator.textContent = typers.join(', ') + " يكتب الآن...";
                } else {
                    indicator.style.display = 'none';
                }
            });
        }

        window.sendMsg = () => {
            const inp = document.getElementById('msgInput');
            if(!inp.value.trim()) return;
            push(ref(db, 'msgs/' + room), { user, text: inp.value, type: 'text' });
            inp.value = "";
            set(ref(db, 'type/' + room + '/' + user), false);
        };

        window.uploadFile = async (file, type) => {
            if(!file) return;
            const fRef = sRef(storage, `media/${room}/${Date.now()}_${file.name}`);
            const snap = await uploadBytes(fRef, file);
            const url = await getDownloadURL(snap.ref);
            push(ref(db, 'msgs/' + room), { user, url, type });
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('micBtn');
            if(!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => uploadFile(new Blob(audioChunks, {type:'audio/webm'}), 'audio');
                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('recording');
                    btn.textContent = "⏹️";
                } catch(e) { alert("يرجى تفعيل المايك من إعدادات المتصفح"); }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording');
                btn.textContent = "🎤";
            }
        };
    </script>
</body>
</html>
