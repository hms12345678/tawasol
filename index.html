<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tawasol Ultra | Eng Hassan Sobeh</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; --danger: #ef4444; --warn-bg: #fff3cd; --warn-text: #856404; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .auth-card { background: var(--card); padding: 25px; border-radius: 20px; width: 92%; max-width: 380px; margin: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #0b1120; padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 10px; text-align: center; font-size: 14px; transition: 0.3s; }
        .tab.active { background: var(--main); color: white; }
        
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-family: 'Cairo'; outline: none; }
        .footer-brand { text-align: center; font-size: 12px; margin-top: 20px; color: var(--main); font-weight: bold; }

        .chat-view { display: none; flex-direction: column; height: 100%; width: 100%; }
        .chat-header { padding: 12px 18px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0b1120; }
        
        /* رسالة التحذير من الأدمن */
        .warning-msg { align-self: center; background: var(--warn-bg); color: var(--warn-text); padding: 12px 20px; border-radius: 12px; border: 2px solid #ffeeba; font-weight: bold; margin: 15px 0; text-align: center; width: 90%; border-left: 6px solid #ffc107; animation: shake 0.5s; }
        @keyframes shake { 0% {transform:translateX(0)} 25% {transform:translateX(5px)} 50% {transform:translateX(-5px)} 100% {transform:translateX(0)} }

        .system-msg { align-self: center; background: rgba(34, 197, 94, 0.1); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 12px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; display: flex; align-items: flex-end; gap: 8px; }
        .msg.me { align-self: flex-start; background: var(--main); color: white; border-bottom-left-radius: 4px; }
        .msg.other { align-self: flex-end; background: #2d3748; color: white; border-bottom-right-radius: 4px; flex-direction: row-reverse; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: #4a5568; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }

        .input-bar { padding: 10px; background: var(--card); display: flex; gap: 8px; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .icon-btn { width: 42px; height: 42px; border-radius: 50%; background: #334155; border: none; color: white; cursor: pointer; }
        .send-btn { background: var(--main); width: 45px; height: 45px; border-radius: 50%; color: white; border: none; cursor: pointer; }
        #typingIndicator { font-size: 11px; color: var(--accent); padding: 5px 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-card" id="authScreen">
        <h2 style="text-align: center; color: var(--main);">Tawasol App</h2>
        <div class="tabs">
            <div class="tab active" id="joinTab" onclick="switchMode('join')">انضمام</div>
            <div class="tab" id="createTab" onclick="switchMode('create')">إنشاء غرفة</div>
        </div>
        <input type="text" id="userName" placeholder="اسمك">
        <input type="text" id="roomName" placeholder="اسم الغرفة">
        <input type="password" id="roomPass" placeholder="كلمة السر">
        <button onclick="processAuth()" id="authBtn" style="width: 100%; background: var(--main); color: white; padding: 13px; border-radius: 12px; font-weight: bold; border:none;">دخول</button>
        <div class="footer-brand">تم الإنشاء بواسطة Eng/Hassan Sobeh</div>
    </div>

    <div class="chat-view" id="chatScreen">
        <div class="chat-header">
            <div style="font-weight: bold; color: var(--main);" id="roomTitle">--</div>
            <button onclick="location.reload()" style="background: transparent; color: var(--danger); font-weight: bold; border:none;">خروج</button>
        </div>
        <div id="messages"></div>
        <div id="typingIndicator"></div>
        <div class="input-bar">
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile(this.files[0], 'image')">
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">🖼️</button>
            <input type="text" id="msgInput" placeholder="رسالتك..." oninput="handleTyping()">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqaoLsPBAY9XJ5_z9x8rGFLK3EdCfE2LQ",
            authDomain: "tawasol-84fcb.firebaseapp.com",
            databaseURL: "https://tawasol-84fcb-default-rtdb.firebaseio.com",
            projectId: "tawasol-84fcb",
            storageBucket: "tawasol-84fcb.appspot.com",
            messagingSenderId: "170212696274",
            appId: "1:170212696274:web:c582dabcfead1c58a24d0b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);
        let user, room, mode = 'join';

        window.switchMode = (m) => {
            mode = m;
            document.getElementById('joinTab').className = m === 'join' ? 'tab active' : 'tab';
            document.getElementById('createTab').className = m === 'create' ? 'tab active' : 'tab';
        };

        window.processAuth = async () => {
            user = document.getElementById('userName').value.trim();
            room = document.getElementById('roomName').value.trim();
            const pass = document.getElementById('roomPass').value.trim();
            if(!user || !room || !pass) return alert("أكمل البيانات");

            const roomRef = ref(db, 'config/' + room);
            const snap = await get(roomRef);

            if(mode === 'create') {
                if(snap.exists()) return alert("الغرفة موجودة");
                await set(roomRef, { pass });
            } else {
                if(!snap.exists() || snap.val().pass !== pass) return alert("بيانات الغرفة خطأ");
            }

            // تفعيل حالة الاتصال (النقطة الخضراء)
            const statusRef = ref(db, `online/${room}/${user}`);
            set(statusRef, true);
            onDisconnect(statusRef).remove();

            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('roomTitle').textContent = room;
            listen();
        };

        function listen() {
            onChildAdded(ref(db, 'msgs/' + room), (snap) => {
                const v = snap.val();
                const div = document.createElement('div');
                
                if(v.type === 'warning') {
                    div.className = "warning-msg";
                    div.textContent = `⚠️ تنبيه من الإدارة: ${v.text}`;
                } else if(v.type === 'system') {
                    div.className = "system-msg";
                    div.textContent = v.text;
                } else {
                    div.className = v.user === user ? "msg me" : "msg other";
                    div.innerHTML = `<div class="msg-avatar">${v.user[0]}</div><div><small style="font-size:9px;opacity:0.6">${v.user}</small><br>${v.text}</div>`;
                }
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });
        }

        window.sendMsg = () => {
            const inp = document.getElementById('msgInput');
            if(!inp.value.trim()) return;
            push(ref(db, 'msgs/' + room), { user, text: inp.value, type: 'text' });
            inp.value = "";
        };
    </script>
</body>
</html>
